{% extends "base.html" %}

{% block content %}
  <section class="form-card">
    {% if mode == "edit" %}
      <h1>Edit post</h1>
    {% else %}
      <h1>Create a post</h1>
    {% endif %}
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="primary">Save</button>
    </form>
  </section>
{% endblock %}
