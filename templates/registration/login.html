{% extends "base.html" %}

{% block content %}
  <section class="auth-card">
    <h1>Welcome back</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="primary">Login</button>
    </form>
    <p class="muted">New here? <a href="{% url 'register' %}">Create an account</a></p>
  </section>
{% endblock %}
