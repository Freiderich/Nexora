{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexora</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}" />
    <link rel="stylesheet" href="{% static 'css/layout.css' %}" />
    <link rel="stylesheet" href="{% static 'css/components.css' %}" />
    <link rel="stylesheet" href="{% static 'css/pages.css' %}" />
    {% block extra_css %}{% endblock %}
  </head>
  <body class="{% block body_class %}{% endblock %}">
    <header class="site-header">
      <div class="container nav">
        <a class="logo" href="{% url 'home' %}">Nexora</a>
        <nav class="menu">
          <a href="{% url 'home' %}">Home</a>
          {% if user.is_authenticated %}
            <a href="{% url 'profile' username=user.username %}">Profile</a>
            <a href="{% url 'post_create' %}">Create Post</a>
            <form class="inline" method="post" action="{% url 'logout' %}">
              {% csrf_token %}
              <button type="submit" class="link-button">Logout</button>
            </form>
          {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
          {% endif %}
        </nav>
      </div>
    </header>

    <main class="container {% block main_class %}{% endblock %}">
      {% if messages %}
        <div class="messages">
          {% for message in messages %}
            <div class="message">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
    <script>
      const updateReactionCounts = (form, data) => {
        const card = form.closest(".card");
        if (!card) return;
        const setText = (selector, value) => {
          const el = card.querySelector(selector);
          if (el && value !== undefined) el.textContent = value;
        };
        setText('[data-like-count]', `❤ ${data.likes_count}`);
      };

      document.addEventListener("submit", async (event) => {
        const form = event.target;
        if (!form.matches(".reaction-picker form, .post-actions form, .post-reactions form, .comment-form, .comment-delete")) return;
        event.preventDefault();
        try {
          const response = await fetch(form.action, {
            method: "POST",
            headers: {
              "X-Requested-With": "XMLHttpRequest",
              "X-CSRFToken": form.querySelector('[name="csrfmiddlewaretoken"]').value,
            },
            body: new FormData(form),
          });
          if (!response.ok) return;
          const data = await response.json();
          if (data.ok) {
            updateReactionCounts(form, data);
            if (form.classList.contains("comment-form")) {
              const input = form.querySelector(".comment-input");
              if (input) input.value = "";
              if (data.comment) appendInlineComment(form, data.comment, data.comments_count);
            }
            if (form.classList.contains("comment-delete")) {
              const card = form.closest(".card") || document;
              const comment = form.closest("[data-comment-id]");
              if (comment) comment.remove();
              const count = card.querySelector(".comment-action");
              if (count && data.comments_count !== undefined) {
                count.lastChild.textContent = ` ${data.comments_count}`;
              }
              const list = card.querySelector("[data-comment-list]");
              if (list && !list.querySelector(".inline-comment")) {
                const empty = document.createElement("p");
                empty.className = "muted";
                empty.textContent = "No comments yet.";
                list.append(empty);
              }
            }
          }
        } catch (error) {
          console.error(error);
        }
      });

      const escapeHtml = (value) => {
        const div = document.createElement("div");
        div.textContent = value ?? "";
        return div.innerHTML;
      };

      const appendInlineComment = (form, comment, commentsCount) => {
        const card = form.closest(".card");
        if (!card) return;
        const list = card.querySelector("[data-comment-list]");
        if (!list) return;
        const empty = list.querySelector(".muted");
        if (empty && empty.textContent.trim() === "No comments yet.") empty.remove();
        const item = document.createElement("div");
        item.className = "comment inline-comment";
        item.dataset.commentId = comment.id;
        const canEdit = comment.can_edit;
        const canDelete = comment.can_delete;
        const actions =
          canEdit || canDelete
            ? `
            <div class="comment-actions">
              ${canEdit ? `<button type="button" class="link-button" data-comment-edit data-comment-edit-url="${escapeHtml(comment.edit_url)}">Edit</button>` : ""}
              ${canDelete ? `
                <form class="comment-delete" method="post" action="${escapeHtml(comment.delete_url)}">
                  <input type="hidden" name="csrfmiddlewaretoken" value="${escapeHtml(comment.csrf_token)}" />
                  <button type="submit" class="link-button">Delete</button>
                </form>
              ` : ""}
            </div>
          `
            : "";
        item.innerHTML = `
          <div class="comment-meta">
            <a href="${escapeHtml(comment.author_url)}">@${escapeHtml(comment.author)}</a>
            <span class="muted">${escapeHtml(comment.created_at)}</span>
          </div>
          <p data-comment-body>${escapeHtml(comment.body)}</p>
          ${actions}
        `;
        list.prepend(item);
        const items = list.querySelectorAll(".inline-comment");
        if (items.length > 3) items[items.length - 1].remove();
        const count = card.querySelector(".comment-action");
        if (count && commentsCount !== undefined) count.lastChild.textContent = ` ${commentsCount}`;
      };

      document.addEventListener("click", (event) => {
        const editToggle = event.target.closest?.("[data-comment-edit]");
        if (editToggle) {
          const comment = editToggle.closest("[data-comment-id]");
          if (!comment) return;
          const body = comment.querySelector("[data-comment-body]");
          if (!body) return;
          const current = body.textContent.trim();
          const next = window.prompt("Edit comment", current);
          if (next === null || next.trim() === current) return;
          const url = editToggle.getAttribute("data-comment-edit-url");
          if (!url) return;
          const token = document.querySelector('input[name="csrfmiddlewaretoken"]')?.value;
          fetch(url, {
            method: "POST",
            headers: {
              "X-Requested-With": "XMLHttpRequest",
              "X-CSRFToken": token || "",
              "Content-Type": "application/x-www-form-urlencoded",
            },
            body: new URLSearchParams({ body: next.trim() }),
          })
            .then((response) => response.json())
            .then((data) => {
              if (!data.ok) return;
              body.textContent = data.comment.body;
              const meta = comment.querySelector(".comment-meta .muted");
              if (meta) meta.textContent = data.comment.created_at;
            })
            .catch((error) => console.error(error));
          return;
        }

        const commentToggle = event.target.closest?.("[data-comment-toggle]");
        if (commentToggle) {
          event.preventDefault();
          const targetId = commentToggle.getAttribute("data-comment-target");
          const wrapper = targetId && document.getElementById(targetId);
          if (wrapper) {
            const nextHidden = wrapper.hasAttribute("hidden") ? false : true;
            if (nextHidden) {
              wrapper.setAttribute("hidden", "");
            } else {
              wrapper.removeAttribute("hidden");
              wrapper.scrollIntoView({ behavior: "smooth", block: "nearest" });
              const input = wrapper.querySelector(".comment-input");
              if (input) requestAnimationFrame(() => input.focus());
            }
          }
          return;
        }

        const commentJump = event.target.closest?.("[data-comment-jump]");
        if (commentJump) {
          const target = document.querySelector("#comment-form .comment-input");
          if (target) {
            requestAnimationFrame(() => target.focus());
          }
        }

        document.querySelectorAll(".post-menu").forEach((menu) => {
          const wrap = menu.closest(".post-menu-wrap");
          const toggle = wrap && wrap.querySelector(".post-menu-toggle");
          const isOpen = wrap && wrap.dataset.open === "true";
          if (toggle && !wrap.contains(event.target)) {
            menu.hidden = true;
            wrap.dataset.open = "false";
            toggle.setAttribute("aria-expanded", "false");
          } else if (toggle && wrap.contains(event.target) && event.target === toggle) {
            const next = !isOpen;
            menu.hidden = !next;
            wrap.dataset.open = String(next);
            toggle.setAttribute("aria-expanded", String(next));
          }
        });
      });
    </script>
  </body>
</html>
