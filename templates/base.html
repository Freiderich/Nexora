{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexora</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}" />
    <link rel="stylesheet" href="{% static 'css/layout.css' %}" />
    <link rel="stylesheet" href="{% static 'css/components.css' %}" />
    <link rel="stylesheet" href="{% static 'css/pages.css' %}" />
    {% block extra_css %}{% endblock %}
  </head>
  <body class="{% block body_class %}{% endblock %}">
    <header class="site-header">
      <div class="container nav">
        <a class="logo" href="{% url 'home' %}">Nexora</a>
        <nav class="menu">
          <a href="{% url 'home' %}">Home</a>
          {% if user.is_authenticated %}
            <a href="{% url 'profile' username=user.username %}">Profile</a>
            <a href="{% url 'post_create' %}">Create Post</a>
            <form class="inline" method="post" action="{% url 'logout' %}">
              {% csrf_token %}
              <button type="submit" class="link-button">Logout</button>
            </form>
          {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
          {% endif %}
        </nav>
      </div>
    </header>

    <main class="container {% block main_class %}{% endblock %}">
      {% if messages %}
        <div class="messages">
          {% for message in messages %}
            <div class="message">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
    <script>
      const updateReactionCounts = (form, data) => {
        const card = form.closest(".card");
        if (!card) return;
        const setText = (selector, value) => {
          const el = card.querySelector(selector);
          if (el && value !== undefined) el.textContent = value;
        };
        setText('[data-like-count]', `❤ ${data.likes_count}`);
      };

      document.addEventListener("submit", async (event) => {
        const form = event.target;
        if (!form.matches(".reaction-picker form, .post-actions form, .post-reactions form")) return;
        event.preventDefault();
        try {
          const response = await fetch(form.action, {
            method: "POST",
            headers: {
              "X-Requested-With": "XMLHttpRequest",
              "X-CSRFToken": form.querySelector('[name="csrfmiddlewaretoken"]').value,
            },
            body: new FormData(form),
          });
          if (!response.ok) return;
          const data = await response.json();
          if (data.ok) updateReactionCounts(form, data);
        } catch (error) {
          console.error(error);
        }
      });

      document.addEventListener("click", (event) => {
        document.querySelectorAll(".post-menu").forEach((menu) => {
          const wrap = menu.closest(".post-menu-wrap");
          const toggle = wrap && wrap.querySelector(".post-menu-toggle");
          const isOpen = wrap && wrap.dataset.open === "true";
          if (toggle && !wrap.contains(event.target)) {
            menu.hidden = true;
            wrap.dataset.open = "false";
            toggle.setAttribute("aria-expanded", "false");
          } else if (toggle && wrap.contains(event.target) && event.target === toggle) {
            const next = !isOpen;
            menu.hidden = !next;
            wrap.dataset.open = String(next);
            toggle.setAttribute("aria-expanded", String(next));
          }
        });
      });
    </script>
  </body>
</html>
