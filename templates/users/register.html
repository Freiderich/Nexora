{% extends "base.html" %}

{% block content %}
  <section class="auth-card">
    <h1>Create your account</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="primary">Register</button>
    </form>
    <p class="muted">Already have an account? <a href="{% url 'login' %}">Login</a></p>
  </section>
{% endblock %}
